<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy TypeTest — Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Ambient background glow -->
    <div class="ambient-glow"></div>

    <header class="glass-header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-mark">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e2b714" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" x2="20" y1="19" y2="19"/></svg>
                </div>
                <h1>Lazy TypeTest</h1>
            </div>
            <div class="header-right">
                <div class="streak-pill" id="streakPill">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
                    <span id="streakNum">0</span> day streak
                </div>
            </div>
        </div>
    </header>

    <main class="dashboard-container">
        <!-- Hero Stats Row -->
        <section class="hero-stats">
            <div class="hero-card hero-primary">
                <div class="hero-card-inner">
                    <div class="hero-label">Average WPM</div>
                    <div class="hero-value" id="avgWpm">0</div>
                    <div class="hero-sub">words per minute</div>
                </div>
                <div class="hero-decoration">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(226,183,20,0.15)" stroke-width="1.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                </div>
            </div>
            <div class="hero-card">
                <div class="hero-card-inner">
                    <div class="hero-label">Average Accuracy</div>
                    <div class="hero-value" id="avgAcc">0<span class="hero-unit">%</span></div>
                </div>
                <div class="hero-decoration">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(226,183,20,0.15)" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
                </div>
            </div>
            <div class="hero-card">
                <div class="hero-card-inner">
                    <div class="hero-label">Highest WPM</div>
                    <div class="hero-value" id="bestWpm">0</div>
                </div>
                <div class="hero-decoration">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(226,183,20,0.15)" stroke-width="1.5"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                </div>
            </div>
        </section>

        <!-- Secondary Stats Row -->
        <section class="secondary-stats">
            <div class="secondary-card">
                <div class="secondary-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e2b714" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
                </div>
                <div class="secondary-info">
                    <span class="secondary-label">Most Tested Site</span>
                    <span class="secondary-value" id="topSite">N/A</span>
                </div>
            </div>
            <div class="secondary-card">
                <div class="secondary-icon">
                    <!-- Keyboard icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e2b714" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2" ry="2"/><path d="M6 8h.001"/><path d="M10 8h.001"/><path d="M14 8h.001"/><path d="M18 8h.001"/><path d="M8 12h.001"/><path d="M12 12h.001"/><path d="M16 12h.001"/><path d="M7 16h10"/></svg>
                </div>
                <div class="secondary-info">
                    <span class="secondary-label">Total Tests Taken</span>
                    <span class="secondary-value" id="totalTests">0</span>
                </div>
            </div>
            <div class="secondary-card">
                <div class="secondary-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e2b714" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>
                </div>
                <div class="secondary-info">
                    <span class="secondary-label">Characters Typed</span>
                    <span class="secondary-value" id="totalChars">0</span>
                </div>
            </div>
        </section>

        <!-- WPM Progress Chart -->
        <section class="chart-section">
            <div class="section-header">
                <h2>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e2b714" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
                    WPM Progress
                </h2>
            </div>
            <div class="chart-container">
                <canvas id="wpmChart"></canvas>
            </div>
        </section>

        <!-- Recent Tests -->
        <section class="history-section">
            <div class="section-header">
                <h2>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e2b714" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    Recent Tests
                </h2>
                <button id="clearBtn" class="danger-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                    Clear
                </button>
            </div>
            <div class="table-container">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Date & Time</th>
                            <th>Site</th>
                            <th>WPM</th>
                            <th>Accuracy</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="dashboard.js"></script>
</body>
</html>
